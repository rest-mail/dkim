name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - name: Build
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # v2.1.6 is built with Go 1.24 and refuses to lint a module that
          # targets go 1.25.0 (go.mod). Pin a build made with Go >= 1.25.
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests with race detector
        run: go test -race -count=1 ./...
